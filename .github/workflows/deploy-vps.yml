name: CI/CD Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Archive build output
        run: tar -czf deploy.tar.gz dist package.json package-lock.json

      - name: Copy file to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          source: "deploy.tar.gz"
          target: ${{ secrets.VPS_TARGET_DIR }}

      - name: Execute Remote SSH commands
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_SSH_USER }}
          password: ${{ secrets.VPS_SSH_PASSWORD }}
          script: |
            # Tự động tạo thư mục nếu chưa có (-p giúp tạo cả thư mục cha nếu cần)
            mkdir -p ${{ secrets.VPS_TARGET_DIR }}
            
            cd ${{ secrets.VPS_TARGET_DIR }}
            
            # Giải nén (ghi đè các file cũ)
            tar -xzf deploy.tar.gz
            
            # Ghi cấu hình .env
            cat > .env << 'EOF'
            ${{ secrets.ENV_FILE_CONTENT }}
            EOF
            
            # Cài đặt dependencies
            npm install --production
            
            # Restart hoặc Start ứng dụng với PM2
            # Lưu ý: Cần đảm bảo đã cài pm2 trên VPS (npm install -g pm2)
            pm2 restart gca-be --update-env || pm2 start dist/main.js --name gca-be
            
            # Dọn dẹp
            rm deploy.tar.gz